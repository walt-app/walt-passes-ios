name: CI

# CHEAP tier (1x Linux): lint-only gate on every PR. PassesCore imports Apple
# Compression so the kernel can't compile on Linux — there's no compile signal,
# and auto-merge gates on lint alone. macOS build/test lives in full-ci.yml.
# The only reliable full-suite gate is DRAFT status (auto-merge skips drafts):
# open risky PRs as a draft, label `full-ci` for the signal, mark ready when
# green. The label alone does NOT gate — a ready PR race-merges on lint first.
on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  swift-format:
    name: swift-format (lint)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      # Pin to 6.2 to match the toolchain the tree was formatted with.
      - uses: swift-actions/setup-swift@v3
        with:
          swift-version: "6.2"

      - name: Show tool versions
        run: |
          swift --version
          swift-format --version || swift format --version || true

      - name: Run swift-format lint
        run: |
          # Toolchain exposes swift-format as either a binary or a subcommand.
          if command -v swift-format >/dev/null 2>&1; then
            swift-format lint --recursive --strict Sources Tests
          else
            swift format lint --recursive --strict Sources Tests
          fi

  swiftlint:
    name: SwiftLint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      # Official Linux image carries SourceKit so AST rules match macOS. Pinned
      # (not `latest`) since lint is the sole merge gate: bumps stay explicit.
      - name: Run SwiftLint (official Linux image)
        run: |
          docker run --rm \
            --entrypoint swiftlint \
            -v "$PWD:/work" -w /work \
            ghcr.io/realm/swiftlint:0.63.2 \
            lint --quiet --strict

  auto-merge:
    name: Auto-merge on green CI
    needs: [swift-format, swiftlint]
    if: >-
      github.event_name == 'pull_request' &&
      github.event.pull_request.draft == false &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.event.pull_request.user.type != 'Bot'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Squash-merge PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr merge "${{ github.event.pull_request.number }}" \
            --repo "${{ github.repository }}" \
            --squash \
            --delete-branch
